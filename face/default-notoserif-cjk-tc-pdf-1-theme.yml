# FOR Asciidoctor-PDF 1.x
# Modify from Asciidoctor-PDF 1.6.2 (default + default-with-fallback-font) - Copyright (C) 2014-present OpenDevise Inc. and the Asciidoctor Project - MIT License
# merge KaiGenGothicTW-theme.yml - Copyright (c) 2015 Rei - MIT License (https://github.com/chloerei/asciidoctor-pdf-cjk-kai_gen_gothic)
font:
  catalog:
    # notoserif-cjk-tc-normal.ttf Fonts supports languages in Taiwan, Hong Kong and Macau that use the Traditional Chinese variant of the Han ideograms. It also supports Hiragana, Katakana, Latin, Cyrillic, Greek and Hangul.
    Liberation Mono:
      normal: LiberationMono-Regular.ttf
      bold: LiberationMono-Bold.ttf
      italic: LiberationMono-Italic.ttf
      bold_italic: LiberationMono-BoldItalic.ttf
    Noto Serif CJK TC:
      normal: NotoSerifCJKtc-Regular.ttf
      bold: NotoSerifCJKtc-Bold.ttf
      italic: NotoSerifCJKtc-Italic.ttf
      bold_italic: NotoSerifCJKtc-BoldItalic.ttf
    # Empty zero
    Noto Sans CJK TC Mono:
      normal: NotoSansMonoCJKtc-Regular.ttf
      bold: NotoSansMonoCJKtc-Bold.ttf
      italic: NotoSansMonoCJKtc-Italic.ttf
      bold_italic: NotoSansMonoCJKtc-BoldItalic.ttf
    Taiwan KaiSu: TW-Kai-98_1.ttf
    Iansui Regular: Iansui-Regular.ttf
  fallbacks: [Noto Sans CJK TC Mono]
page:
  background_color: FFFFFF
  layout: portrait
  initial_zoom: FitH
##  margin: [0.5in, 0.67in, 0.67in, 0.67in]
  margin: [15mm, 0mm, 19mm, 0mm]
  # margin_inner and margin_outer keys are used for recto/verso print margins when media=prepress
##  margin_inner: 0.75in
  margin_inner: 22mm
##  margin_outer: 0.59in
  margin_outer: 18mm
##  size: B5
  size: 176mm x 229mm
base:
  # ORG
  # align: justify
  # 20221012 KaiGenGothicTW ADD  
  align: justify
  # color as hex string (leading # is optional)
  font_color: 000000
  # color as RGB array
  #font_color: [51, 51, 51]
  # color as CMYK array (approximated)
  #font_color: [0, 0, 0, 0.92]
  #font_color: [0, 0, 0, 92%]
  font_family: Noto Serif CJK TC
  # choose one of these font_size/line_height_length combinations
  #font_size: 14
  #line_height_length: 20
  #font_size: 11.25
  #line_height_length: 18
  #font_size: 11.2
  #line_height_length: 16
##  font_size: 10.5
  font_size: 10
  #line_height_length: 15
  # correct line height for Noto Serif metrics
  # ORG
  #line_height_length: 12
  # 20221012 KaiGenGothicTW ADD  
  line_height_length: 15
  #font_size: 11.25
  #line_height_length: 18
  line_height: $base_line_height_length / $base_font_size
  font_size_lead: round($base_font_size * 1.5)
  font_size_large: round($base_font_size * 1.25)
  font_size_small: round($base_font_size * 0.85)
  font_size_min: $base_font_size * 0.75
  font_style: normal
  border_color: EEEEEE
  border_radius: 4
##  border_width: 0.5
  border_width: 0.3
role:
  line-through:
    text_decoration: line-through
  underline:
    text_decoration: underline
  lead:
    font_size: $base_font_size_lead
  big:
    font_size: $base_font_size_large
  small:
    font_size: $base_font_size_small
  subtitle:
    font_size: 0.8em
    font_color: 999999
# FIXME vertical_rhythm is weird; we should think in terms of ems
#vertical_rhythm: $base_line_height_length * 2 / 3
# correct line height for Noto Serif metrics (comes with built-in line height)
vertical_rhythm: $base_line_height_length
horizontal_rhythm: $base_line_height_length
# QUESTION should vertical_spacing be block_spacing instead?
vertical_spacing: $vertical_rhythm
link:
  font_color: 428BCA
# literal is currently used for inline monospaced in prose and table cells
literal:
  font_color: B12146
  font_family: Liberation Mono
button:
  content: "[\u2009%s\u2009]"
  font_style: bold
key:
  background_color: F5F5F5
  border_color: CCCCCC
  border_offset: 2
  border_radius: 2
  border_width: 0.5
  font_family: $literal_font_family
  separator: "\u202f+\u202f"
mark:
  font_color: 888888
  background_color: FFFFFF
#  border_offset: 1
menu:
  caret_content: " <font size=\"1.15em\"><color rgb=\"b12146\">\u203a</color></font> "
heading:
  chapter_break_before: always
  align: left
  font_color: $base_font_color
  # 20221012 KaiGenGothicTW ADD
  font_family: $base_font_family
  font_style: bold
  # h1 is used for part titles (book doctype) or the doctitle (article doctype)
#  h1_font_size: floor($base_font_size * 2.6)
  h1_font_size: floor($base_font_size * 4.5)
  # h2 is used for chapter titles (book doctype only)
  h2_font_size: floor($base_font_size * 2.15)
  h3_font_size: round($base_font_size * 1.7)
  h4_font_size: $base_font_size_large
  h5_font_size: $base_font_size
  h6_font_size: $base_font_size_small
  #line_height: 1.4
  # correct line height for Noto Serif metrics (comes with built-in line height)
  # ORG
  # line_height: 1
  # 20221012 KaiGenGothicTW ADD
  line_height: 1.2
  # ORG  
  # margin_top: $vertical_rhythm * 0.4
  # 20221012 KaiGenGothicTW ADD  
  margin_top: $vertical_rhythm * 0.2
  # ORG
  # margin_bottom: $vertical_rhythm * 0.9
  # 20221012 KaiGenGothicTW ADD  
  margin_bottom: $vertical_rhythm * 0.8
  min_height_after: $base_line_height_length * 1.5
title_page:
  align: right
  logo:
    top: 80%
    align: center
  title:
    top: 15%
    font_family: Iansui Regular
    font_size: $heading_h1_font_size
    line_height: 1.2
    margin_bottom: $base_font_size * 2
  subtitle:
    font_size: $heading_h3_font_size
    font_style: bold_italic
    line_height: 1
    font_color: 999999
  authors:
    margin_top: $base_font_size * 6
    font_size: $base_font_size_large
    font_color: 181818
  revision:
    margin_top: $base_font_size * 1.25
block:
  # ORG 
  # margin_top: 0
  # ORG  
  # margin_bottom: $vertical_rhythm
  # 20221012 KaiGenGothicTW ADD
  padding: [$vertical_rhythm, $vertical_rhythm * 1.25, $vertical_rhythm, $vertical_rhythm * 1.25]
caption:
  align: left
  font_size: $base_font_size * 0.95
  font_style: italic
  # FIXME perhaps set line_height instead of / in addition to margins?
  # ORG
  # margin_inside: $vertical_rhythm / 3
  # 20221012 KaiGenGothicTW ADD
  margin_inside: $vertical_rhythm * 0.25  
  # margin_inside: $vertical_rhythm / 4
  margin_outside: 0
lead:
  font_size: $base_font_size_lead
  line_height: 1.4
abstract:
  font_color: 5C6266
  font_size: $lead_font_size
  line_height: $lead_line_height
  font_style: italic
  first_line_font_style: bold
  title:
    align: center
    font_color: $heading_font_color
    font_size: $heading_h4_font_size
    font_style: $heading_font_style
admonition:
  # 20221012 KaiGenGothicTW ADD
  border_color: $base_border_color
  # 20221012 KaiGenGothicTW ADD
  border_width: $base_border_width
  column_rule_color: $base_border_color
  column_rule_width: $base_border_width
  padding: [0, $horizontal_rhythm, 0, $horizontal_rhythm]
  #icon:
  #  tip:
  #    name: far-lightbulb
  #    stroke_color: 111111
  #    size: 24
  label:
    text_transform: uppercase
    font_style: bold
blockquote:
  # 20221012 KaiGenGothicTW ADD
  font_family: Iansui Regular
  font_color: $base_font_color
  font_size: $base_font_size_large
  border_color: $base_border_color
  # ORG
  # border_width: 0
  # border_left_width: 5
  # 20221012 KaiGenGothicTW ADD
  border_width: 0  
  border_left_width: 0
  # FIXME disable negative padding bottom once margin collapsing is implemented
  padding: [0, $horizontal_rhythm, $block_margin_bottom * -0.75, $horizontal_rhythm + $blockquote_border_left_width / 2]
  cite_font_size: $base_font_size_small
  cite_font_color: 999999
verse:
  font_size: $blockquote_font_size
  border_color: $blockquote_border_color
  border_width: $blockquote_border_width
  border_left_width: $blockquote_border_left_width
  padding: $blockquote_padding
  cite_font_size: $blockquote_cite_font_size
  cite_font_color: $blockquote_cite_font_color
# code is used for source blocks (perhaps change to source or listing?)
code:
  align: left
  font_color: $base_font_color
  font_family: $literal_font_family
  font_size: ceil($base_font_size_small)
  padding: $code_font_size * 0.6
  line_height: 1.25
  # line_gap is an experimental property to control how a background color is applied to an inline block element
  line_gap: 3.8
  background_color: F5F5F5
  border_color: CCCCCC
  border_radius: $base_border_radius
  border_width: 0.75
conum:
  font_family: $literal_font_family
  font_color: $literal_font_color
  font_size: $base_font_size
  line_height: 4 / 3
  glyphs: circled
example:
  align: left
  border_color: $base_border_color
  border_radius: $base_border_radius
  # border_width: 0.75
  border_width: 0.0
  # ORG
  # background_color: $page_background_color
  # 20221012 KaiGenGothicTW ADD  
  background_color: transparent  
  # FIXME reenable padding bottom once margin collapsing is implemented
  # padding: [$vertical_rhythm, $horizontal_rhythm, 0, $horizontal_rhythm]
  padding: [-5, 0, -15, 10]
  font_size: $base_font_size_small
  font_family: $literal_font_family
image:
  align: left
  # 20221012 KaiGenGothicTW ADD
  scaled_width_default: 0.5  
prose:
  margin_top: $block_margin_top
  margin_bottom: $block_margin_bottom
sidebar:
  background_color: EEEEEE
  # ORG
  # border_color: E1E1E1
  # 20221012 KaiGenGothicTW ADD  
  border_color: FFFFFF
  border_radius: $base_border_radius
  border_width: $base_border_width
  # FIXME reenable padding bottom once margin collapsing is implemented
  padding: [$vertical_rhythm, $vertical_rhythm * 1.25, 0, $vertical_rhythm * 1.25]
  title:
    align: center
    font_color: $heading_font_color
    font_size: $heading_h4_font_size
    font_style: $heading_font_style
    # 20221012 KaiGenGothicTW ADD
    font_family: $heading_font_family
thematic_break:
  border_color: $base_border_color
  border_style: solid
  border_width: $base_border_width
  margin_top: $vertical_rhythm * 0.5
  margin_bottom: $vertical_rhythm * 1.5
description_list:
  # ORG
  # term_font_style: bold
  # 20221012 KaiGenGothicTW ADD  
  term_font_style: italic  
  term_spacing: $vertical_rhythm / 4
  description_indent: $horizontal_rhythm * 1.25
outline_list:
  indent: $horizontal_rhythm * 1.5
  #marker_font_color: 404040
  # NOTE outline_list_item_spacing applies to list items that do not have complex content
  item_spacing: $vertical_rhythm / 4
table:
  background_color: $page_background_color
  border_color: DDDDDD
  border_width: $base_border_width
  # ORG
  # cell_padding: 3
  # 20221012 KaiGenGothicTW ADD
  # HACK accounting for line-height
  # 20221012 KaiGenGothicTW ADD
##  cell_padding: [3, 3, 6, 3]
  cell_padding: [2, 2, 3, 3]
  head:
    font_style: bold
    border_bottom_width: $base_border_width * 2.5
  body:
    stripe_background_color: F9F9F9
  # 20221012 KaiGenGothicTW ADD    
  even_row_background_color: F9F9F9
  #odd_row_background_color: <hex value>    
  foot:
    background_color: F0F0F0
toc:
  indent: $horizontal_rhythm
  line_height: 1.4
  dot_leader:
    #content: ". "
    # ORG
    # font_color: A9A9A9
    # 20221012 KaiGenGothicTW ADD
    font_color: DDDDDD
    #levels: 2 3
footnotes:
  font_size: round($base_font_size * 0.75)
  item_spacing: $outline_list_item_spacing / 2
header:
  font_size: $base_font_size_small
  line_height: 1
  vertical_align: middle
footer:
  font_size: $base_font_size_small
  # 20221012 KaiGenGothicTW ADD  
  font_color: $base_font_color  
  # NOTE if background_color is set, background and border will span width of page
  border_color: 999999
  border_width: 0.25
  height: $base_line_height_length * 3
  line_height: 1
  padding: [$base_line_height_length / 2, 1, 0, 1]
  vertical_align: top
  title-style: basic
  recto:
    #columns: "<50% =0% >50%"
    right:
      content: '{page-number}'
    left:
      content: '{chapter-title}'
  verso:
    #columns: $footer_recto_columns
    left:
      # OTG
      # content: $footer_recto_right_content
      # 20221012 KaiGenGothicTW ADD        
      content: '{page-number}'
    right:
      content: '電腦上試跑 LINUX'
